<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product preview card component</title>
</head>

<body>

  <div class="product-card">
    <div class="image-container">
      <img src="./images/image-product-desktop.jpg" class="desktop" alt="product">
      <img src="./images/image-product-mobile.jpg" class="mobile" alt="product">
    </div>

    <div class="info-container">
      <span class="type">Perfume</span>

      <h1 class="title">Gabrielle Essence Eau De Parfum</h1>

      <p class="description">
        A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of
        CHANEL.
      </p>

      <div class="prices">
        <span class="discount">$149.99</span>
        <span class="before">$169.99</span>
      </div>

      <button type="button"> <img src="./images/icon-cart.svg" alt="cart icon"> Add to Cart</button>
    </div>
  </div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Yaroslav</a>.
  </div>
</body>

</html>
